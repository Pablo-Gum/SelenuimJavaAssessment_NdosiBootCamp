# Specify both handlers for the root logger
handlers= java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Default global logging level.
.level= ALL

# Console Handler properties
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# File Handler properties
# The 'true' is implied by default for FileHandler append mode, but we can explicitly set properties
java.util.logging.FileHandler.pattern = %h/Pablo_SeleniumJavaAssessment.log
java.util.logging.FileHandler.limit = 50000 
java.util.logging.FileHandler.count = 1 
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter
# Ensure append mode is active (it is by default, but this is how you'd configure other props)
# Note: append mode isn't a properties file setting, it's a constructor argument,
# so for property file configuration it's best to rely on the default (which is append).
